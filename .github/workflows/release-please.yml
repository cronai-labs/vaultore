name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When a release is created, update versions.json and build the plugin
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Setup Bun
        if: ${{ steps.release.outputs.release_created }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile

      - name: Update versions.json
        if: ${{ steps.release.outputs.release_created }}
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            versions[manifest.version] = manifest.minAppVersion;
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, '\t') + '\n');
            console.log('versions.json updated:', manifest.version, '->', manifest.minAppVersion);
          "

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build

      - name: Package plugin
        if: ${{ steps.release.outputs.release_created }}
        run: bun run obsidian:package

      - name: Upload plugin artifacts to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            packages/obsidian/package/vaultore/main.js \
            packages/obsidian/package/vaultore/manifest.json \
            packages/obsidian/package/vaultore/styles.css \
            --clobber

      - name: Push versions.json update
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "chore(release): update versions.json for ${{ steps.release.outputs.version }}"
          git push origin HEAD:master
